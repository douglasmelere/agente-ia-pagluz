<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}PagLuz — Admin{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a21;
      --panel-2: #1d2230;
      --border: #262b36;
      --text: #e8ecf1;
      --muted: #8b93a7;
      --accent: #ffcc33;
      --accent-2: #ff9900;
      --ok: #29c08a;
      --danger: #ef5b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { margin: 0; font-size: 16px; letter-spacing: 0.3px; }
    header h1 span { color: var(--accent); }
    nav a {
      color: var(--muted); text-decoration: none; margin-left: 18px;
      font-weight: 500;
    }
    nav a.active, nav a:hover { color: var(--text); }
    main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    h2 { margin: 0 0 16px; font-size: 18px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 18px;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left; padding: 10px 12px;
      border-bottom: 1px solid var(--border); vertical-align: middle;
    }
    th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block; padding: 3px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
    }
    .badge.on  { background: rgba(41, 192, 138, 0.15); color: var(--ok); }
    .badge.off { background: rgba(139, 147, 167, 0.15); color: var(--muted); }
    .btn {
      display: inline-block; border: 1px solid var(--border); background: var(--panel-2);
      color: var(--text); padding: 6px 12px; border-radius: 6px; font-size: 12px;
      cursor: pointer; text-decoration: none;
    }
    .btn:hover { border-color: var(--accent); }
    .btn.primary { background: var(--accent); color: #141414; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
    .btn.danger  { color: var(--danger); border-color: rgba(239, 91, 107, 0.3); }
    .btn.danger:hover { background: rgba(239, 91, 107, 0.1); border-color: var(--danger); }
    form.inline { display: inline; }
    input[type=text], select {
      background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
      padding: 8px 10px; border-radius: 6px; font: inherit; width: 100%;
    }
    input[type=text]:focus, select:focus { outline: 2px solid var(--accent); }
    label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; }
    .row { display: flex; gap: 12px; align-items: flex-end; }
    .row > * { flex: 1; }
    .muted { color: var(--muted); font-size: 12px; }
    .muted.small { font-size: 11px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tabs a { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; text-decoration: none; color: var(--muted); font-size: 12px; }
    .tabs a.active { background: var(--accent); color: #141414; border-color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>Pag<span>Luz</span> · Admin</h1>
    <nav>
      <a href="/admin/conversations" class="{{ 'active' if request.url.path.startswith('/admin/conversations') else '' }}">Conversas</a>
      <a href="/admin/triggers" class="{{ 'active' if request.url.path.startswith('/admin/triggers') else '' }}">Triggers</a>
      <a href="/admin/settings" class="{{ 'active' if request.url.path.startswith('/admin/settings') else '' }}">Configurações</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
